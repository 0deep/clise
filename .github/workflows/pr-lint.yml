name: PR Lint

on:
  pull_request:
    branches: [ "master", "main" ]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  super-lint:
    name: Lint Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Full git history is needed to get a proper list of changed files
          fetch-depth: 0

      - name: Lint Code Base
        uses: super-linter/super-linter@v7
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Rust linters are managed in a separate rust-lint.yml, so they are excluded from Super-Linter.
          VALIDATE_RUST: false
          VALIDATE_RUST_CLIPPY: false
          VALIDATE_RUST_FMT: false
          # Exclude Checkov (for local Dockerfile) and JSCPD (for copy-paste detection).
          VALIDATE_CHECKOV: false
          VALIDATE_JSCPD: false
